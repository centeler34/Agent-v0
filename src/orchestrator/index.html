<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agent v0 | Dashboard</title>
    <style>
        body { background: #0a0a0c; color: #e1e1e6; font-family: 'Inter', system-ui, sans-serif; margin: 0; overflow: hidden; }
        .container { display: grid; grid-template-columns: 240px 1fr 300px; height: 100vh; }
        header { grid-column: 1 / span 3; background: #141417; border-bottom: 1px solid #2d2d33; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-weight: 800; color: #00f2ff; letter-spacing: -1px; font-size: 1.2rem; }
        .sidebar { background: #0f0f12; border-right: 1px solid #2d2d33; padding: 20px; }
        .main { display: flex; flex-direction: column; background: #0a0a0c; }
        .terminal { flex: 1; padding: 20px; font-family: 'Fira Code', monospace; font-size: 13px; overflow-y: auto; color: #a1a1aa; }
        .input-area { padding: 20px; border-top: 1px solid #2d2d33; }
        input { width: 100%; background: #141417; border: 1px solid #3f3f46; color: white; padding: 12px; border-radius: 6px; outline: none; }
        input:focus { border-color: #00f2ff; }
        .tasks { background: #0f0f12; border-left: 1px solid #2d2d33; padding: 20px; }
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .online { background: #10b981; box-shadow: 0 0 8px #10b981; }
        .auth-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .auth-card { background: #141417; padding: 40px; border-radius: 12px; border: 1px solid #2d2d33; width: 350px; text-align: center; }
    </style>
</head>
<body>
    <div id="auth" class="auth-overlay">
        <div class="auth-card">
            <h2 style="color: #00f2ff">AGENT V0</h2>
            <p style="color: #71717a">Enter Master Password to unlock</p>
            <input type="password" id="passInput" placeholder="Password..." onkeydown="if(event.key==='Enter') login()">
            <button onclick="login()" style="margin-top: 20px; width: 100%; padding: 10px; background: #00f2ff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">Unlock Fleet</button>
        </div>
    </div>

    <div class="container">
        <header>
            <div class="logo">AGENT V0 <span style="color: #71717a; font-weight: normal; font-size: 0.8rem">v1.0.0</span></div>
            <div id="connection-status"><span class="status-dot online"></span> DAEMON CONNECTED</div>
        </header>
        
        <div class="sidebar">
            <h4 style="color: #71717a; text-transform: uppercase; font-size: 0.7rem">Agents</h4>
            <div id="agent-list">
                <div style="margin-bottom: 10px"><span class="status-dot online"></span> Agentic</div>
                <div style="margin-bottom: 10px"><span class="status-dot online"></span> Recon</div>
                <div style="margin-bottom: 10px"><span class="status-dot" style="background: #3f3f46"></span> Code</div>
            </div>
        </div>

        <div class="main">
            <div class="terminal" id="output">
                <div style="color: #3f3f46">-- Fleet ready for orchestration --</div>
            </div>
            <div class="input-area">
                <input type="text" id="cmdInput" placeholder="Type a command or natural language intent..." onkeydown="if(event.key==='Enter') sendCmd()">
            </div>
        </div>

        <div class="tasks">
            <h4 style="color: #71717a; text-transform: uppercase; font-size: 0.7rem">Active Tasks</h4>
            <div id="task-list">
                <p style="color: #3f3f46; font-size: 0.8rem">No active tasks</p>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const output = document.getElementById('output');

        function login() {
            const password = document.getElementById('passInput').value;
            socket.emit('auth', { password });
        }

        socket.on('auth_success', () => {
            document.getElementById('auth').style.display = 'none';
            log('System unlocked. Task Registry decrypted.');
        });

        socket.on('auth_error', (data) => {
            alert(data.message);
        });

        function log(msg, color = '#e1e1e6') {
            const div = document.createElement('div');
            div.style.color = color;
            div.style.marginBottom = '5px';
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            output.appendChild(div);
            output.scrollTo({ top: output.scrollHeight, behavior: 'smooth' });
        }

        function sendCmd() {
            const input = document.getElementById('cmdInput');
            const val = input.value;
            if(!val) return;
            
            log(`> ${val}`, '#00f2ff');
            socket.emit('submit_task', { task_type: 'intent', raw_input: val });
            input.value = '';
        }

        socket.on('task_update', (data) => {
            if (data.type === 'task_accepted') {
                log(`Task ${data.payload.task_id} accepted by daemon.`, '#71717a');
            } else if (data.type === 'task_output') {
                // Handle real-time streaming output
                log(`[${data.payload.agent_id}] ${data.payload.text}`);
            } else if (data.type === 'task_complete') {
                log(`Task ${data.payload.task_id} completed successfully.`, '#10b981');
            }
        });

        socket.on('task_error', (data) => {
            log(`Error: ${data.message}`, '#ef4444');
        });
    </script>
</body>
</html>
